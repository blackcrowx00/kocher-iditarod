name: Scrape Iditarod Standings

on:
  schedule:
    # Runs every 3 hours during race month (March)
    - cron: '0 */3 * 3 *'
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Scrape standings
        run: node scrape-standings.js

      - name: Commit standings data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add standings.json
          git diff --staged --quiet || git commit -m "Update standings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
