<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Kocher Family Iditarod Tracker</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<header>
<h1>🏁 Kocher Family Iditarod Tracker</h1>
<p id="lastUpdated"></p>
</header>

<div class="grid">

<section>

<h2>🏆 Family Leaderboard</h2>

<table id="leaderboard">
<thead>
<tr>
<th>Player</th>
<th>Mushers</th>
<th>Score</th>
</tr>
</thead>
<tbody></tbody>

</table>

</section>

<section>

<h2>🐕 Race Standings</h2>

<table id="standings">
<thead>
<tr>
<th>Pos</th>
<th>Musher</th>
<th>Checkpoint</th>
<th>Dogs</th>
</tr>
</thead>

<tbody></tbody>
</table>

</section>

</div>

<section>

<h2>🗺️ Race Map</h2>

<div id="map"></div>

</section>

<script src="checkpoints.js"></script>
<script src="map.js"></script>
<script src="script.js"></script>

</body>
</html>
