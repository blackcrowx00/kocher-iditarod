<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kocher Family Iditarod Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>Kocher Family Iditarod Tracker</h1>
      <p id="lastUpdated">Last Updated:</p>
    </header>

    <section class="card">
      <h2>Family Leaderboard</h2>
      <table id="leaderboard">
        <thead>
          <tr>
            <th>Family Member</th>
            <th>Selected Mushers (Bib)</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Race Standings</h2>
      <table id="standings">
        <thead>
          <tr>
            <th>Musher</th>
            <th>Bib</th>
            <th>Position</th>
            <th>Checkpoint</th>
            <th>Dogs</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
