<!DOCTYPE html>
<html>
<head>
<title>Edit Picks</title>
</head>

<body>

<h1>Edit Family Picks</h1>

<textarea id="editor" style="width:100%;height:400px;"></textarea>

<script>

fetch("picks.json")
.then(r=>r.text())
.then(data=>{

document.getElementById("editor").value=data

})

</script>

<p>Copy → edit → commit to GitHub</p>

</body>
</html>
